name: Planning Function CI

on:
  push:
  workflow_dispatch:

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r sya_task_scheduler/requirements.txt
      - run: chmod +x bin/planning-server scripts/*.sh
      - run: npm test
      - run: scripts/package-runtime.sh linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: sya-function-planning-linux-x64
          path: dist/sya-function-planning-*-linux-x64.tar.gz
